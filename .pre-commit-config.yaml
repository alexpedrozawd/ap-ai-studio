# Achado de auditoria (Engenheiro de Software): sem lint automatico antes de commit.
# De proposito minimalista - so' pyflakes (deteccao de erro real: import nao usado,
# nome indefinido) pro Python, sem reformatar nada. O projeto usa TAB pra indentacao
# em todo o codigo Python - um formatter automatico (black/ruff format) reescreveria
# milhares de linhas de uma vez so', criando um diff gigante sem relacao com bugs
# reais. Rodar so' o linter, nunca o formatter, evita isso.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        name: ruff (so' pyflakes - deteccao de erro, sem reformatar)
        args: [--select=F]
        # Sem o hook "ruff-format" de proposito - reformataria as milhares de linhas
        # com TAB do projeto de uma vez so'.

  - repo: local
    hooks:
      - id: eslint-frontend
        name: eslint (webui/frontend, so' lint - sem --fix automatico)
        # pre-commit passa caminhos relativos a raiz do repo (ex.: webui/frontend/src/App.tsx),
        # mas o eslint.config.js/node_modules vivem dentro de webui/frontend - o
        # "${@#webui/frontend/}" tira esse prefixo de cada argumento antes do cd.
        entry: bash -c 'cd webui/frontend && npx eslint --max-warnings=0 "${@#webui/frontend/}"' --
        language: system
        files: ^webui/frontend/src/.*\.(ts|tsx)$

      - id: mypy-leve
        name: mypy (checagem leve de tipos - informativo, nao bloqueia o commit)
        # Achado de auditoria (sugestao "mypy/pyright em modo leve"): o codebase inteiro
        # ja passa limpo com --ignore-missing-imports, mas deliberadamente nao bloqueamos
        # o commit ainda (o "|| true" no final sempre sai com codigo 0) - a ideia e' dar
        # visibilidade de regressao de tipo sem virar uma trava rigida de um dia pro outro
        # num projeto que nunca teve checagem de tipo antes. Roda no webui-pipeline (unico
        # ambiente com mypy instalado, mesmo do bandit/ruff/pre-commit).
        entry: >-
          bash -c '/home/ap/ap-ai-studio/miniconda3/envs/webui-pipeline/bin/python -m mypy
          --ignore-missing-imports --no-error-summary
          run_vfx.py vfx_config.py vfx_core.py vfx_gates.py vfx_comfyui.py
          vfx_workflows.py vfx_facefusion.py vfx_ffmpeg.py test_run_vfx.py
          test_standalone_scripts.py webui/backend/*.py || true'
        language: system
        pass_filenames: false
        files: \.py$
